name: Backend CI

on:
  push:
    branches: [main]
  pull_request: 
    branches: [main]
    
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
  steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - run: dotnet restore WifiWarriorAPI.sln
    - run: dotnet build WifiWarriorAPI.sln --configuration Release --no-restore
    - run: dotnet test WifiWarriorAPI.sln --configuration Release --no-build --verbosity normal